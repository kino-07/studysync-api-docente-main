<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Panel de Control</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

    header {
      background: #1a1a2e; color: white; padding: 16px 32px;
      display: flex; justify-content: space-between; align-items: center;
    }
    header h1 { font-size: 1.3rem; }
    header span { font-size: 0.85rem; opacity: 0.7; }
    #btnLogout {
      background: #e74c3c; color: white; border: none;
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }

    .container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }

    /* Alertas en tiempo real */
    #alertas {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 8px; padding: 16px; margin-bottom: 24px;
      display: none;
    }
    #alertas h3 { color: #856404; margin-bottom: 8px; }
    #listaAlertas { list-style: none; }
    #listaAlertas li {
      background: white; border-left: 4px solid #ffc107;
      padding: 10px 14px; margin-bottom: 6px; border-radius: 4px;
      font-size: 0.9rem;
    }
    #listaAlertas li.vencido { border-left-color: #e74c3c; background: #fff5f5; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: white; border-radius: 10px; padding: 20px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .stat-card .numero { font-size: 2rem; font-weight: 700; color: #1a1a2e; }
    .stat-card .label  { font-size: 0.85rem; color: #666; margin-top: 4px; }

    /* Tabla */
    .card {
      background: white; border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); overflow: hidden;
    }
    .card-header {
      padding: 16px 24px; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-header h2 { font-size: 1.1rem; }
    #btnRecargar {
      background: #1a1a2e; color: white; border: none;
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }

    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8f9fa; }
    th, td { padding: 12px 16px; text-align: left; font-size: 0.88rem; border-bottom: 1px solid #eee; }
    th { font-weight: 600; color: #555; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
    tr:hover { background: #f8f9fa; }

    .badge {
      padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .badge.activo   { background: #d4edda; color: #155724; }
    .badge.devuelto { background: #e2e3e5; color: #383d41; }
    .badge.vencido  { background: #f8d7da; color: #721c24; }
    .badge.proximo  { background: #fff3cd; color: #856404; }

    .btn-devolver {
      background: #28a745; color: white; border: none;
      padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;
    }
    .btn-devolver:hover { background: #218838; }

    #sinDatos { text-align: center; padding: 40px; color: #999; display: none; }

    /* Login overlay */
    #loginOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .login-box {
      background: white; border-radius: 12px; padding: 40px; width: 360px;
    }
    .login-box h2 { margin-bottom: 20px; text-align: center; }
    .login-box input {
      width: 100%; padding: 10px 14px; margin-bottom: 12px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;
    }
    .login-box button {
      width: 100%; padding: 11px; background: #1a1a2e; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 1rem;
    }
    #loginError { color: #e74c3c; font-size: 0.85rem; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>📚 Biblioteca — Admin</h2>
    <input type="email"    id="loginEmail"    placeholder="Correo electrónico">
    <input type="password" id="loginPassword" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <p id="loginError"></p>
  </div>
</div>

<!-- Panel principal -->
<header>
  <h1>📚 Biblioteca — Panel de Control</h1>
  <div style="display:flex; align-items:center; gap:16px;">
    <span id="adminNombre"></span>
    <button id="btnLogout" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<div class="container">

  <!-- Alertas en tiempo real -->
  <div id="alertas">
    <h3>⚠ Alertas de vencimiento</h3>
    <ul id="listaAlertas"></ul>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="numero" id="statTotal">—</div>
      <div class="label">Total préstamos</div>
    </div>
    <div class="stat-card">
      <div class="numero" id="statActivos">—</div>
      <div class="label">Activos</div>
    </div>
    <div class="stat-card">
      <div class="numero" id="statVencidos">—</div>
      <div class="label">Vencidos</div>
    </div>
  </div>

  <!-- Tabla historial -->
  <div class="card">
    <div class="card-header">
      <h2>Historial de préstamos</h2>
      <button id="btnRecargar" onclick="cargarPrestamos()">↻ Recargar</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Estudiante</th>
          <th>Correo</th>
          <th>Libro</th>
          <th>Autor</th>
          <th>Días</th>
          <th>Fecha préstamo</th>
          <th>Vence</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tablaPrestamos"></tbody>
    </table>
    <div id="sinDatos">No hay préstamos registrados aún.</div>
  </div>
</div>

<script>
  const API = '';
  let token = localStorage.getItem('token');
  let socket;

  // ── Auth ──────────────────────────────────────────────────────────────────
  async function login() {
    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('loginError').textContent = data.error;
      return;
    }

    if (data.usuario.rol !== 'ADMIN') {
      document.getElementById('loginError').textContent = 'Solo el administrador puede acceder aquí.';
      return;
    }

    token = data.token;
    localStorage.setItem('token', token);
    localStorage.setItem('usuario', JSON.stringify(data.usuario));
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminNombre').textContent = data.usuario.nombre;
    iniciar();
  }

  function logout() {
    localStorage.clear();
    location.reload();
  }

  // ── Iniciar ───────────────────────────────────────────────────────────────
  function iniciar() {
    cargarPrestamos();
    conectarSocket();
  }

  // ── Socket.io ─────────────────────────────────────────────────────────────
  function conectarSocket() {
    socket = io();

    socket.on('nuevo-prestamo', (evento) => {
      cargarPrestamos();
    });

    socket.on('alerta-vencimiento', (evento) => {
      mostrarAlerta(evento.payload.mensaje, false);
      cargarPrestamos();
    });

    socket.on('alerta-vencido', (evento) => {
      mostrarAlerta(evento.payload.mensaje, true);
      cargarPrestamos();
    });
  }

  function mostrarAlerta(mensaje, esVencido) {
    const div = document.getElementById('alertas');
    const ul  = document.getElementById('listaAlertas');
    div.style.display = 'block';
    const li = document.createElement('li');
    if (esVencido) li.classList.add('vencido');
    li.textContent = `[${new Date().toLocaleTimeString()}] ${mensaje}`;
    ul.prepend(li);
  }

  // ── Cargar préstamos ──────────────────────────────────────────────────────
  async function cargarPrestamos() {
    const res  = await fetch(`${API}/api/prestamos`);
    const data = await res.json();

    const prestamos = data.datos || [];
    const tbody     = document.getElementById('tablaPrestamos');
    const ahora     = new Date();

    tbody.innerHTML = '';

    if (prestamos.length === 0) {
      document.getElementById('sinDatos').style.display = 'block';
      return;
    }
    document.getElementById('sinDatos').style.display = 'none';

    let activos = 0, vencidos = 0;

    prestamos.forEach(p => {
      const vence      = new Date(p.fechaVencimiento);
      const horasRest  = Math.ceil((vence - ahora) / (1000 * 60 * 60));
      const estaVencido = !p.devuelto && vence < ahora;
      const estaProximo = !p.devuelto && horasRest <= 24 && horasRest > 0;

      if (!p.devuelto && !estaVencido) activos++;
      if (estaVencido) vencidos++;

      let badgeClass, badgeTexto;
      if (p.devuelto)       { badgeClass = 'devuelto'; badgeTexto = 'Devuelto'; }
      else if (estaVencido) { badgeClass = 'vencido';  badgeTexto = 'Vencido';  }
      else if (estaProximo) { badgeClass = 'proximo';  badgeTexto = `Vence en ${horasRest}h`; }
      else                  { badgeClass = 'activo';   badgeTexto = 'Activo';   }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${p.id}</td>
        <td>${p.estudiante.nombre}</td>
        <td>${p.estudiante.email}</td>
        <td>${p.libroTitulo}</td>
        <td>${p.libroAutor}</td>
        <td>${p.diasPrestamo} días</td>
        <td>${new Date(p.fechaPrestamo).toLocaleString('es-BO')}</td>
        <td>${vence.toLocaleString('es-BO')}</td>
        <td><span class="badge ${badgeClass}">${badgeTexto}</span></td>
        <td>${!p.devuelto
          ? `<button class="btn-devolver" onclick="marcarDevuelto(${p.id})">Devuelto</button>`
          : '—'
        }</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('statTotal').textContent   = prestamos.length;
    document.getElementById('statActivos').textContent  = activos;
    document.getElementById('statVencidos').textContent = vencidos;
  }

  // ── Marcar devuelto ───────────────────────────────────────────────────────
  async function marcarDevuelto(id) {
    const res = await fetch(`${API}/api/prestamos/${id}/devolver`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (res.ok) cargarPrestamos();
    else {
      const data = await res.json();
      alert(data.error);
    }
  }

  // ── Arranque ──────────────────────────────────────────────────────────────
  window.onload = () => {
    if (token) {
      const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
      if (usuario.rol === 'ADMIN') {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminNombre').textContent = usuario.nombre;
        iniciar();
      }
    }
  };
</script>
</body>
</html>
