<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Estudiante</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

    header {
      background: #1a1a2e; color: white; padding: 16px 32px;
      display: flex; justify-content: space-between; align-items: center;
    }
    header h1 { font-size: 1.2rem; }
    #btnLogout {
      background: #e74c3c; color: white; border: none;
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }

    .container { max-width: 900px; margin: 24px auto; padding: 0 24px; }

    /* Alerta de vencimiento */
    #alertaBox {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 8px; padding: 16px; margin-bottom: 24px; display: none;
    }
    #alertaBox h3 { color: #856404; margin-bottom: 8px; }
    #listaAlertas { list-style: none; }
    #listaAlertas li {
      background: white; border-left: 4px solid #ffc107;
      padding: 10px 14px; margin-bottom: 6px; border-radius: 4px; font-size: 0.9rem;
    }
    #listaAlertas li.vencido { border-left-color: #e74c3c; background: #fff5f5; }

    /* Formulario nuevo préstamo */
    .card {
      background: white; border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 24px; margin-bottom: 24px;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 20px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-full  { grid-column: 1 / -1; }

    label { font-size: 0.85rem; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem;
    }
    input:focus { outline: none; border-color: #1a1a2e; }

    .dias-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .dia-opcion {
      border: 2px solid #ddd; border-radius: 8px;
      padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .dia-opcion:hover { border-color: #1a1a2e; }
    .dia-opcion.seleccionado { border-color: #1a1a2e; background: #1a1a2e; color: white; }
    .dia-opcion .numero { font-size: 1.4rem; font-weight: 700; }
    .dia-opcion .texto  { font-size: 0.75rem; margin-top: 2px; }

    #btnPrestar {
      margin-top: 20px; width: 100%; padding: 12px;
      background: #1a1a2e; color: white; border: none;
      border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600;
    }
    #btnPrestar:hover { background: #2d2d5e; }

    #msgPrestamo {
      margin-top: 12px; padding: 10px; border-radius: 6px;
      font-size: 0.9rem; text-align: center; display: none;
    }
    #msgPrestamo.exito { background: #d4edda; color: #155724; }
    #msgPrestamo.error { background: #f8d7da; color: #721c24; }

    /* Tabla mis préstamos */
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8f9fa; }
    th, td { padding: 11px 14px; text-align: left; font-size: 0.85rem; border-bottom: 1px solid #eee; }
    th { font-weight: 600; color: #555; text-transform: uppercase; font-size: 0.73rem; letter-spacing: 0.5px; }
    tr:hover { background: #f8f9fa; }

    .badge {
      padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .badge.activo   { background: #d4edda; color: #155724; }
    .badge.devuelto { background: #e2e3e5; color: #383d41; }
    .badge.vencido  { background: #f8d7da; color: #721c24; }
    .badge.proximo  { background: #fff3cd; color: #856404; }

    .card-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    #btnRecargar {
      background: #1a1a2e; color: white; border: none;
      padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 0.82rem;
    }
  </style>
</head>
<body>

<header>
  <h1>📚 Biblioteca — Mi cuenta</h1>
  <div style="display:flex; align-items:center; gap:16px;">
    <span id="estudianteNombre" style="font-size:0.9rem; opacity:0.8;"></span>
    <button id="btnLogout" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<div class="container">

  <!-- Alertas en tiempo real -->
  <div id="alertaBox">
    <h3>⚠ Alertas de vencimiento</h3>
    <ul id="listaAlertas"></ul>
  </div>

  <!-- Formulario nuevo préstamo -->
  <div class="card">
    <h2>📖 Registrar nuevo préstamo</h2>
    <div class="form-grid">
      <div class="form-full">
        <label>Título del libro</label>
        <input type="text" id="libroTitulo" placeholder="Ej: Cálculo Diferencial">
      </div>
      <div>
        <label>Autor</label>
        <input type="text" id="libroAutor" placeholder="Ej: Stewart">
      </div>
      <div>
        <label>Fecha y hora de devolución</label>
        <input type="datetime-local" id="fechaVencimiento" style="width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:6px; font-size:0.9rem;">
      </div>
    </div>
    <button id="btnPrestar" onclick="crearPrestamo()">Registrar préstamo</button>
    <div id="msgPrestamo"></div>
  </div>

  <!-- Mis préstamos -->
  <div class="card">
    <div class="card-header">
      <h2>📋 Mis préstamos</h2>
      <button id="btnRecargar" onclick="cargarMisPrestamos()">↻ Recargar</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Libro</th>
          <th>Autor</th>
          <th>Días</th>
          <th>Fecha préstamo</th>
          <th>Vence</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tablaPrestamos"></tbody>
    </table>
  </div>

</div>

<script>
  const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
  const token   = localStorage.getItem('token');
  

  // Verificar que está autenticado
  if (!token || !usuario.id) {
    window.location.href = '/login.html';
  }

  document.getElementById('estudianteNombre').textContent = usuario.nombre || '';


  function logout() {
    localStorage.clear();
    window.location.href = '/login.html';
  }

  // ── Crear préstamo ────────────────────────────────────────────────────────
 async function crearPrestamo() {
  const libroTitulo     = document.getElementById('libroTitulo').value.trim();
  const libroAutor      = document.getElementById('libroAutor').value.trim();
  const fechaVencimiento = document.getElementById('fechaVencimiento').value;

  if (!libroTitulo) {
    mostrarMsg('El título del libro es obligatorio.', 'error');
    return;
  }

  if (!fechaVencimiento) {
    mostrarMsg('Debes elegir una fecha y hora de devolución.', 'error');
    return;
  }

  const ahora = new Date();
  const vence = new Date(fechaVencimiento);
  if (vence <= ahora) {
    mostrarMsg('La fecha de devolución debe ser futura.', 'error');
    return;
  }

  // Calcular días entre hoy y la fecha elegida
  const dias = Math.ceil((vence - ahora) / (1000 * 60 * 60 * 24));

  const res = await fetch('/api/prestamos', {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${token}`
    },
    body: JSON.stringify({
      libroTitulo,
      libroAutor:      libroAutor || 'Desconocido',
      diasPrestamo:    dias,
      fechaVencimiento: vence.toISOString()
    })
  });
  const data = await res.json();

  if (!res.ok) {
    mostrarMsg(data.error, 'error');
    return;
  }

  mostrarMsg(`✓ Préstamo registrado. Vence el ${vence.toLocaleString('es-BO')}`, 'exito');
  document.getElementById('libroTitulo').value = '';
  document.getElementById('libroAutor').value  = '';
  document.getElementById('fechaVencimiento').value = '';
  cargarMisPrestamos();
}
</script>
</body>
</html>
