<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Registro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: white; border-radius: 12px;
      padding: 40px; width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; margin-bottom: 8px; color: #1a1a2e; }
    .subtitulo { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }

    label { font-size: 0.85rem; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
    input, select {
      width: 100%; padding: 10px 14px; margin-bottom: 16px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;
    }
    input:focus, select:focus { outline: none; border-color: #1a1a2e; }

    .dias-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .dia-opcion {
      border: 2px solid #ddd; border-radius: 8px;
      padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .dia-opcion:hover { border-color: #1a1a2e; }
    .dia-opcion.seleccionado { border-color: #1a1a2e; background: #1a1a2e; color: white; }
    .dia-opcion .numero { font-size: 1.4rem; font-weight: 700; }
    .dia-opcion .texto  { font-size: 0.75rem; margin-top: 2px; }

    button[type="submit"] {
      width: 100%; padding: 12px; background: #1a1a2e; color: white;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 1rem; font-weight: 600; margin-top: 4px;
    }
    button[type="submit"]:hover { background: #2d2d5e; }

    #mensaje {
      margin-top: 14px; padding: 12px; border-radius: 6px;
      font-size: 0.9rem; text-align: center; display: none;
    }
    #mensaje.exito { background: #d4edda; color: #155724; }
    #mensaje.error { background: #f8d7da; color: #721c24; }

    .link { text-align: center; margin-top: 16px; font-size: 0.88rem; color: #666; }
    .link a { color: #1a1a2e; font-weight: 600; text-decoration: none; }

    .rol-badge {
      display: none; text-align: center; margin-bottom: 16px;
      padding: 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>📚 Biblioteca</h2>
  <p class="subtitulo">Crear cuenta de estudiante</p>

  <label>Nombre completo</label>
  <input type="text" id="nombre" placeholder="Ej: Juan Pérez">

  <label>Correo electrónico</label>
  <input type="email" id="email" placeholder="estudiante@upds.edu.bo">

  <label>Contraseña</label>
  <input type="password" id="password" placeholder="Mínimo 6 caracteres">

  <label>Duración del préstamo por defecto</label>
  <div class="dias-grid">
    <div class="dia-opcion" onclick="seleccionarDias(7, this)">
      <div class="numero">7</div>
      <div class="texto">días</div>
    </div>
    <div class="dia-opcion seleccionado" onclick="seleccionarDias(14, this)">
      <div class="numero">14</div>
      <div class="texto">días</div>
    </div>
    <div class="dia-opcion" onclick="seleccionarDias(30, this)">
      <div class="numero">30</div>
      <div class="texto">días</div>
    </div>
  </div>

  <div class="rol-badge" id="rolBadge"></div>

  <button type="submit" onclick="registrar()">Crear cuenta</button>

  <div id="mensaje"></div>

  <div class="link">
    ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
  </div>
</div>

<script>
  let diasSeleccionados = 14;

  function seleccionarDias(dias, el) {
    diasSeleccionados = dias;
    document.querySelectorAll('.dia-opcion').forEach(d => d.classList.remove('seleccionado'));
    el.classList.add('seleccionado');
  }

  async function registrar() {
    const nombre   = document.getElementById('nombre').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg      = document.getElementById('mensaje');

    if (!nombre || !email || !password) {
      mostrarMensaje('Todos los campos son obligatorios.', 'error');
      return;
    }

    const res  = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      mostrarMensaje(data.error, 'error');
      return;
    }

    const rol = data.usuario.rol;
    const rolBadge = document.getElementById('rolBadge');
    rolBadge.style.display = 'block';

    if (rol === 'ADMIN') {
      rolBadge.style.background = '#d4edda';
      rolBadge.style.color      = '#155724';
      rolBadge.textContent      = '👑 Eres el administrador del sistema';
    } else {
      rolBadge.style.background = '#cce5ff';
      rolBadge.style.color      = '#004085';
      rolBadge.textContent      = '🎓 Cuenta de estudiante creada';
    }

    mostrarMensaje(data.mensaje, 'exito');

    setTimeout(() => {
      window.location.href = '/login.html';
    }, 2500);
  }

  function mostrarMensaje(texto, tipo) {
    const msg = document.getElementById('mensaje');
    msg.textContent    = texto;
    msg.className      = tipo;
    msg.style.display  = 'block';
  }
</script>
</body>
</html>
